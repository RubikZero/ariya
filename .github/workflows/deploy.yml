name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "README.en.md"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
      - ".prettierrc"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate locale strings
        run: npm run build:strings

      - name: Inject D1 database ID
        run: node -e "require('fs').writeFileSync('wrangler.jsonc', require('fs').readFileSync('wrangler.jsonc','utf-8').replace('__D1_DATABASE_ID__', process.env.D1_DATABASE_ID))"
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}

      - name: Run migrations
        run: npx wrangler d1 migrations apply DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set secrets (if configured)
        run: |
          if [ -n "$CF_ACCESS_TEAM_DOMAIN" ]; then
            echo "$CF_ACCESS_TEAM_DOMAIN" | npx wrangler secret put CF_ACCESS_TEAM_DOMAIN
          fi
          if [ -n "$OWNER_EMAIL" ]; then
            echo "$OWNER_EMAIL" | npx wrangler secret put OWNER_EMAIL
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ACCESS_TEAM_DOMAIN: ${{ secrets.CF_ACCESS_TEAM_DOMAIN }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
