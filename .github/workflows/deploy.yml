name: Deploy

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - "README.md"
      - "README.en.md"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
      - ".prettierrc"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Deploy to production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run predeploy
        env:
          CI: true

      - name: Inject D1 database ID
        run: node -e "require('fs').writeFileSync('wrangler.jsonc', require('fs').readFileSync('wrangler.jsonc','utf-8').replace('__D1_DATABASE_ID__', process.env.D1_DATABASE_ID))"
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}

      - name: Run migrations
        run: npx wrangler d1 migrations apply DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set secrets (if configured)
        run: |
          if [ -n "$CF_ACCESS_TEAM_DOMAIN" ]; then
            echo "$CF_ACCESS_TEAM_DOMAIN" | npx wrangler secret put CF_ACCESS_TEAM_DOMAIN
          fi
          if [ -n "$OWNER_EMAIL" ]; then
            echo "$OWNER_EMAIL" | npx wrangler secret put OWNER_EMAIL
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ACCESS_TEAM_DOMAIN: ${{ secrets.CF_ACCESS_TEAM_DOMAIN }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    name: Deploy to dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run predeploy
        env:
          CI: true

      - name: Generate wrangler.dev.jsonc from template
        run: cp wrangler.dev.jsonc.example wrangler.dev.jsonc

      - name: Inject dev D1 database ID
        run: node -e "require('fs').writeFileSync('wrangler.dev.jsonc', require('fs').readFileSync('wrangler.dev.jsonc','utf-8').replace('__DEV_D1_DATABASE_ID__', process.env.DEV_D1_DATABASE_ID))"
        env:
          DEV_D1_DATABASE_ID: ${{ secrets.DEV_D1_DATABASE_ID }}

      - name: Run migrations (dev)
        run: npx wrangler d1 migrations apply DB --remote --config wrangler.dev.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set dev secrets
        run: |
          echo "$DEV_HMAC_SECRET_KEY" | npx wrangler secret put HMAC_SECRET_KEY --config wrangler.dev.jsonc
          if [ -n "$CF_ACCESS_TEAM_DOMAIN" ]; then
            echo "$CF_ACCESS_TEAM_DOMAIN" | npx wrangler secret put CF_ACCESS_TEAM_DOMAIN --config wrangler.dev.jsonc
          fi
          if [ -n "$OWNER_EMAIL" ]; then
            echo "$OWNER_EMAIL" | npx wrangler secret put OWNER_EMAIL --config wrangler.dev.jsonc
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEV_HMAC_SECRET_KEY: ${{ secrets.DEV_HMAC_SECRET_KEY }}
          CF_ACCESS_TEAM_DOMAIN: ${{ secrets.CF_ACCESS_TEAM_DOMAIN }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}

      - name: Deploy Worker (dev)
        run: npx wrangler deploy --config wrangler.dev.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
